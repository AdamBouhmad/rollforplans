<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Roulette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left" aria-hidden="true"></div>
    <div class="ambient ambient-right" aria-hidden="true"></div>
    <main class="shell">
      <section class="card">
        <h1>Cafe Roulette</h1>
        <p class="subtitle">Find a cozy table, a warm cup, and your next focus spot.</p>

        <button id="pick-cafe" type="button">Brew Me A Study Spot</button>

        <article id="result" class="result" aria-live="polite">
          <h2>Ready to settle in</h2>
          <p>Press the button and we will pull a fresh Seattle cafe for your study block.</p>
        </article>

      </section>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
